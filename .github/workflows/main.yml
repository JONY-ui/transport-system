name: Deploy React App
on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    # זה אומר לגיטהאב שכל הפקודות רצות בתוך התיקייה שלך
    defaults:
      run:
        working-directory: transport-fixed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build project
        # ה-CI=false מבטיח שהבנייה לא תיעצר בגלל אזהרות קטנות
        run: CI=false npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # כאן אנחנו אומרים לו איפה נמצאת תיקיית התוצר הסופי
          path: transport-fixed/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
